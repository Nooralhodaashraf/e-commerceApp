<section class="py-20 bg-linear-to-br from-slate-50 via-white to-slate-200">
  <div class="container mx-auto">
    <div
      class="border-l-4 border-primary-600 pl-4 flex justify-between items-center flex-wrap gap-4 mb-12"
    >
      <h2 class="text-4xl font-extrabold text-gray-800 relative tracking-tight">
        Shop By

        <span class="w-20 h-1 text-emerald-700 mt-2 rounded-full"> Category </span>
      </h2>
    </div>
    <div class="grid sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-6">
      @for (catigory of catigoryList; track catigory._id) {
        <div class="mt-6" [routerLink]="['/spicifcCatigory', catigory._id]">
          <div
            class="group bg-white/80 backdrop-blur shadow-sm hover:shadow-2xl rounded-2xl p-6 flex flex-col items-center transition-all duration-500 hover:-translate-y-2 hover:scale-[1.03] border border-gray-100 cursor-pointer"
          >
            <div
              class="relative mb-4 p-3 rounded-full bg-linear-to-br from-emerald-100 to-emerald-50 group-hover:from-emerald-200 group-hover:to-emerald-100 transition"
            >
              <img
                [src]="catigory.image"
                class="size-16 rounded-full object-cover transition-transform duration-500 group-hover:scale-110"
                [alt]="catigory.slug"
              />
            </div>

            <h3
              class="text-sm font-semibold text-gray-700 group-hover:text-emerald-600 transition-colors"
            >
              {{ catigory.name }}
            </h3>

            <div
              class="h-0.5 w-0 bg-emerald-500 mt-2 group-hover:w-10 transition-all duration-300 rounded-full"
            ></div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
